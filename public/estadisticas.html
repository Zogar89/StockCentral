<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <title>StockCentral · Vendedores interno</title>
    <meta name="description" content="Estadisticas internas de movimiento de stock por vendedor.">
    <link rel="stylesheet" href="styles.css">
    <script src="estadisticas.js" defer></script>
  </head>
  <body>
    <main class="internal-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Consumo interno</p>
          <h1>Estadisticas de vendedores</h1>
        </div>
      </header>

      <section class="status-strip">
        <span id="vendor-updated">Cargando...</span>
        <strong id="vendor-window">Ultimos 30 dias</strong>
      </section>

      <section id="vendor-disabled" class="internal-empty" hidden>
        <h2>Pagina apagada</h2>
        <p>El feature flag interno esta desactivado.</p>
      </section>

      <section id="vendor-dashboard" aria-label="Estadisticas internas de vendedores"></section>
    </main>
  </body>
</html>
