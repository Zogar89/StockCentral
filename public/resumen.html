<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StockCentral · Resumen</title>
    <meta name="description" content="Tabla compacta de stock de filamentos por proveedor.">
    <link rel="stylesheet" href="styles.css">
    <script src="resumen.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Resumen por proveedor</p>
          <h1>StockCentral</h1>
        </div>
        <div class="topbar-actions">
          <a class="nav-link" href="index.html">Catálogo</a>
          <a class="nav-link active" href="resumen.html">Resumen</a>
        </div>
      </header>

      <section class="status-strip">
        <span id="summary-updated">Actualizando...</span>
        <strong id="summary-count">0 filamentos</strong>
      </section>

      <section class="filters one-line" aria-label="Buscar en resumen">
        <label class="search-field">
          <span>Buscar</span>
          <input id="summary-search" type="search" placeholder="negro, pla, grilon, 1kg">
        </label>
      </section>

      <section class="table-shell" aria-label="Resumen de stock">
        <div class="table-scroll">
          <table id="summary-table" class="summary-table"></table>
        </div>
      </section>
    </main>
  </body>
</html>
