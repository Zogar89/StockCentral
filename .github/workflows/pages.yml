name: GitHub Pages

on:
  workflow_dispatch:
  schedule:
    # Dias habiles 09, 12, 15 y 18 hs Argentina (UTC-3).
    - cron: "0 12,15,18,21 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -v

      - name: Build stock data
        run: python -m stockcentral.build_data --output public/data/stock.json

      - name: Persist daily snapshot
        run: |
          if [ -z "$(git status --porcelain -- stockcentral/data/daily_provider_stock_snapshot.json)" ]; then
            echo "No daily snapshot changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stockcentral/data/daily_provider_stock_snapshot.json
          git commit -m "Update daily provider stock snapshot"
          git push

      - name: Generate thumbnails
        run: python -m stockcentral.generate_thumbnails --stock-json public/data/stock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy site
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
